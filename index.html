<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PEC Hub — Avanti Residential</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#f8fafc;color:#0f172a}
    button,input,textarea,select{font-family:'DM Sans',sans-serif}
    .hub{max-width:820px;margin:0 auto;min-height:100vh;border:1px solid #e2e8f0;box-shadow:0 8px 40px rgba(0,0,0,.12)}
    nav{background:#0f1e3d;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
    .nav-logo{display:flex;align-items:center;gap:8px;cursor:pointer}
    .nav-logo span{color:#fff;font-weight:800;font-size:15px}
    .nav-badge{background:rgba(255,255,255,.15);color:rgba(255,255,255,.85);font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
    .nav-links{display:flex;gap:2px;flex-wrap:wrap}
    .nav-btn{background:transparent;color:rgba(255,255,255,.6);border:none;padding:5px 8px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
    .nav-btn:hover{color:#fff;background:rgba(255,255,255,.1)}
    .nav-btn.active{color:#fff;background:rgba(255,255,255,.15)}
    .page{min-height:500px}
    .hero{background:linear-gradient(135deg,#0f1e3d 0%,#1a2f55 60%,#1e3a7a 100%);padding:32px;color:#fff}
    .hero-eyebrow{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:8px}
    .hero h1{font-size:24px;font-weight:800;margin-bottom:6px}
    .hero p{font-size:14px;color:rgba(255,255,255,.65);margin-bottom:24px;max-width:480px}
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    .stat-card{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:12px 14px}
    .stat-num{font-size:22px;font-weight:800;color:#fff}
    .stat-label{font-size:10px;color:rgba(255,255,255,.6);margin-top:2px}
    .content{padding:24px 28px;background:#f8fafc}
    .section-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#64748b;margin-bottom:12px;margin-top:4px}
    .quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
    .quick-card{background:#fff;border:1.5px solid #e2e8f0;border-radius:14px;padding:14px;cursor:pointer;text-align:left;display:flex;align-items:flex-start;gap:10px;transition:all .15s;width:100%}
    .quick-card h3{font-weight:700;font-size:13px;color:#0f172a;margin-bottom:2px}
    .quick-card p{font-size:11px;color:#64748b}
    .tagline{background:linear-gradient(135deg,#0f1e3dee,#1a2f55ee);border-radius:14px;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;margin-top:8px}
    .tagline-text{font-size:13px;font-weight:700;color:#fff;margin-bottom:3px}
    .tagline-sub{font-size:11px;color:rgba(255,255,255,.5)}
    .manager-section{margin-bottom:28px;max-width:240px}
    .team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px}
    .flip-card{height:210px;perspective:900px;cursor:pointer}
    .flip-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,.2,.2,1)}
    .flip-card:hover .flip-inner,.flip-card.flipped .flip-inner{transform:rotateY(180deg)}
    .flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:16px;padding:14px;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .flip-back{transform:rotateY(180deg);background:#fff;align-items:flex-start;justify-content:center}
    .flip-avatar{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.2);border:3px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:10px}
    .flip-name{font-size:13px;font-weight:800;color:#fff;text-align:center;margin-bottom:3px}
    .flip-role{font-size:10px;color:rgba(255,255,255,.8);font-weight:600;margin-bottom:12px}
    .flip-hint{font-size:10px;color:rgba(255,255,255,.6)}
    .flip-bar{width:24px;height:3px;border-radius:4px;margin-bottom:10px}
    .flip-back-name{font-size:13px;font-weight:800;color:#0f1e3d;margin-bottom:2px}
    .flip-back-role{font-size:11px;font-weight:700;margin-bottom:10px}
    .flip-fact-label{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
    .flip-fact{font-size:11px;color:#334155;line-height:1.6;margin-bottom:10px}
    .flip-quote{font-size:11px;font-style:italic;line-height:1.6;padding-left:8px}
    .page-header{background:linear-gradient(135deg,#0f1e3d 0%,#1a2f55 100%);padding:24px 28px 20px;color:#fff}
    .page-header-inner{display:flex;align-items:center;gap:12px;margin-bottom:5px}
    .page-header h1{font-size:20px;font-weight:700;color:#fff}
    .page-header p{font-size:13px;color:rgba(255,255,255,.65);padding-left:34px}
    .search-wrap{position:relative;margin-bottom:16px}
    .search-wrap input{width:100%;padding:10px 14px 10px 36px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:13px;outline:none;background:#fff}
    .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.4;font-size:15px;pointer-events:none}
    .card{background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;overflow:hidden;cursor:pointer;margin-bottom:8px;transition:border-color .15s}
    .card.open{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
    .card-header{padding:13px 15px;display:flex;align-items:center;justify-content:space-between}
    .card-left{display:flex;align-items:center;gap:8px}
    .card-title{font-size:13px;font-weight:600;color:#0f172a}
    .card-body{padding:0 15px 14px;border-top:1px solid #f1f5f9}
    .card-body p{font-size:13px;color:#475569;margin-top:12px;line-height:1.7}
    .badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap}
    .chevron{font-size:13px;color:#64748b;transition:transform .2s;display:inline-block}
    .chevron.open{transform:rotate(180deg)}
    .meta{font-size:11px;color:#64748b;white-space:nowrap}
    .btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;display:inline-block}
    .btn-primary{background:#3b82f6;color:#fff}
    .btn-purple{background:#7c3aed;color:#fff}
    .btn-teal{background:#0d9488;color:#fff}
    .filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
    .filter-btn{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid #e2e8f0;background:#fff;color:#64748b;transition:all .15s}
    .filter-btn.active{background:#0f1e3d;color:#fff;border-color:#0f1e3d}
    .video-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .video-card{background:#fff;border:1.5px solid #e2e8f0;border-radius:14px;overflow:hidden;cursor:pointer;transition:all .15s}
    .video-card:hover{border-color:#d97706;box-shadow:0 0 0 3px rgba(217,119,6,.1)}
    .video-thumb{background:linear-gradient(135deg,#0f1e3d,#1a2f55);height:80px;display:flex;align-items:center;justify-content:center;position:relative}
    .play-btn{width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.5);color:#fff;font-size:11px;padding-left:2px}
    .duration{position:absolute;bottom:6px;right:8px;background:rgba(0,0,0,.55);color:#fff;font-size:10px;padding:2px 5px;border-radius:4px}
    .video-info{padding:10px 12px}
    .video-title{font-size:12px;font-weight:700;color:#0f172a;margin-top:5px;line-height:1.4}
    .sc-header{background:linear-gradient(135deg,#0f1e3d 0%,#1a2f55 100%);padding:24px 28px 0;color:#fff}
    .sc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px}
    .sc-tabs{display:flex;gap:2px}
    .sc-tab{padding:9px 16px;border:none;cursor:pointer;font-size:11px;font-weight:700;background:transparent;color:rgba(255,255,255,.55);border-radius:10px 10px 0 0;display:flex;align-items:center;gap:4px;transition:all .15s;border-bottom:3px solid transparent}
    .sc-tab.active{background:#fff;color:#0f1e3d}
    .kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
    .kpi-card{background:#fff;border:1.5px solid #e2e8f0;border-radius:14px;overflow:hidden}
    .kpi-card.on-goal{border-color:#bbf7d0}
    .kpi-card.below{border-color:#fecaca}
    .kpi-inner{padding:13px 15px}
    .kpi-label{font-size:11px;font-weight:700;color:#64748b;margin-bottom:4px}
    .kpi-score{font-size:20px;font-weight:800}
    .kpi-score.on-goal{color:#15803d}
    .kpi-score.below{color:#dc2626}
    .kpi-score.no-data{color:#94a3b8}
    .kpi-goal{font-size:11px;color:#64748b;margin-left:5px}
    .kpi-status{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
    .kpi-status.on-goal{color:#15803d;background:#dcfce7}
    .kpi-status.below{color:#dc2626;background:#fee2e2}
    .kpi-status.no-data{color:#64748b;background:#f1f5f9}
    .progress-bar{height:5px;background:#f1f5f9;border-radius:6px;overflow:hidden;margin-top:8px}
    .progress-fill{height:100%;border-radius:6px;transition:width .4s ease}
    .agent-toggle{font-size:10px;font-weight:600;border:1px solid;border-radius:8px;padding:2px 7px;cursor:pointer;background:none;margin-top:5px}
    .agent-table{margin-top:12px;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
    .agent-table-header{display:grid;grid-template-columns:1fr 70px 70px;background:#f8fafc;padding:7px 12px;border-bottom:1px solid #e2e8f0;font-size:10px;font-weight:700;color:#64748b}
    .agent-row{display:grid;grid-template-columns:1fr 70px 70px;padding:8px 12px;align-items:center;border-bottom:1px solid #f1f5f9;font-size:12px}
    .agent-row:last-child{border-bottom:none}
    .agent-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;margin-right:7px}
    .agent-name-wrap{display:flex;align-items:center}
    .sync-panel{background:#fff;border:1.5px solid #e2e8f0;border-radius:14px;padding:14px 16px;margin-bottom:14px}
    .sync-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .sync-input{flex:1;padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;outline:none}
    .sync-btn{padding:7px 16px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
    .sync-btn:disabled{background:#94a3b8;cursor:not-allowed}
    .sync-hint{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:7px 11px;font-size:11px;color:#64748b;line-height:1.7;margin-bottom:10px}
    .manual-hint{border-radius:10px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700}
    .edit-btn{font-size:11px;color:#64748b;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:4px 9px;cursor:pointer;font-weight:600}
    .login-wrap{padding:36px 28px;display:flex;justify-content:center;background:#f8fafc}
    .login-box{background:#fff;border:1.5px solid #e2e8f0;border-radius:16px;padding:28px;width:100%;max-width:360px}
    .login-input{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:13px;outline:none;margin-bottom:10px}
    .login-btn{width:100%;padding:10px;background:#0f1e3d;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:10px}
    .login-err{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:7px 11px;font-size:11px;color:#dc2626;margin-bottom:10px}
    .coaching-header{background:linear-gradient(135deg,#0f1e3d 0%,#1e1a4e 100%);padding:24px 28px 20px;color:#fff}
    .signout-btn{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.2);border-radius:8px;font-size:11px;padding:4px 9px;cursor:pointer}
    footer{background:#0f1e3d;padding:10px 24px;display:flex;align-items:center;justify-content:space-between}
    footer span{font-size:10px;color:rgba(255,255,255,.4)}
    /* EOD */
    .eod-form{background:#fff;border:1.5px solid #e2e8f0;border-radius:14px;padding:20px;margin-bottom:16px}
    .eod-label{font-size:12px;font-weight:700;color:#0f172a;display:block;margin-bottom:6px}
    .eod-input{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;outline:none;margin-bottom:14px;background:#fff}
    .eod-textarea{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;outline:none;margin-bottom:14px;resize:vertical;min-height:80px;background:#fff}
    .eod-select{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;outline:none;margin-bottom:14px;background:#fff;appearance:none}
    .eod-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .eod-submit{width:100%;padding:12px;background:#0f1e3d;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}
    .eod-success{background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:12px;padding:20px;text-align:center;margin-bottom:16px}
    .eod-log-card{background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:14px 16px;margin-bottom:8px}
    .eod-log-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .eod-log-name{font-size:14px;font-weight:700;color:#0f172a}
    .eod-log-time{font-size:11px;color:#64748b}
    .eod-log-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
    .eod-log-stat{background:#f8fafc;border-radius:8px;padding:8px 10px}
    .eod-log-stat-num{font-size:16px;font-weight:800;color:#0f172a}
    .eod-log-stat-label{font-size:10px;color:#64748b;margin-top:1px}
    .eod-logout-banner{background:linear-gradient(135deg,#dc2626,#b91c1c);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px;margin-top:20px}
    .upload-area{border:2px dashed #cbd5e1;border-radius:10px;padding:16px;text-align:center;margin-bottom:14px;cursor:pointer;transition:border-color .15s}
    .upload-area:hover{border-color:#3b82f6}
    .upload-area input{display:none}
    .upload-preview{display:flex;align-items:center;gap:8px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:8px 12px;margin-top:8px;font-size:12px;color:#0369a1;font-weight:600}
    @media(max-width:600px){
      .team-grid{grid-template-columns:repeat(2,1fr)}
      .quick-grid{grid-template-columns:repeat(2,1fr)}
      .kpi-grid{grid-template-columns:1fr}
      .video-grid{grid-template-columns:1fr}
      .stats-grid{grid-template-columns:repeat(2,1fr)}
      .eod-grid{grid-template-columns:1fr}
      .nav-links{display:none}
    }
  </style>
</head>
<body>
<div class="hub">
  <nav id="nav">
    <div class="nav-logo" onclick="showPage('home')">
      <span>🏢</span>

    </div>
    <div class="nav-links" id="navLinks"></div>

  <div class="page" id="pageContent"></div>
  <footer>

<script>

const KB = [
  // Tour & Scheduling
  {id:1,title:'Proper Tour Scheduling Process',cat:'Tour & Scheduling',tag:'SOP',summary:'Always use the ADD TOUR feature on the prospect\'s guest card. The Community Calendar is only a fallback when the LC or CM calendar has issues and no availability shows after using ADD TOUR. Any Community Calendar override requires LC confirmation first.'},
  {id:2,title:'Missed Tour Follow-Up',cat:'Tour & Scheduling',tag:'SOP',summary:'Follow up within 2 hours of a missed tour. Complete 3 attempts: call, voicemail, then email. Focus on rescheduling. Only mark Lost - No Response after 3 unanswered attempts.'},
  {id:3,title:'Pre-Self-Guided Tour Lead Intake & Customization Call',cat:'Tour & Scheduling',tag:'Spiel/Process',summary:'Full script covering opening, contact verification, SGT expectations, warm discovery questions (move-in date, unit type, occupants, pets, budget, lease length, source, move reason), walk-through steps, tour confirmation, and soft pre-close.'},
  // Lead Management
  {id:4,title:'Lead Follow-Through Process',cat:'Lead Management',tag:'SOP',summary:'5-touchpoint outreach process. Each touchpoint: call attempt → no answer → voicemail + email/SMS → next touchpoint. If answered and tour scheduled → notify Community Team. If answered and no tour → mark DNR. After 5 unanswered attempts → DNR.'},
  {id:5,title:'Outreach Expectations',cat:'Lead Management',tag:'SOP',summary:'Every outbound/returned call must have a voicemail plus follow-up email. Non-negotiable. Voicemail only waived if mailbox is full or system issue prevents it — email still required in all cases.'},
  {id:6,title:'Handling Realtor-Initiated Inquiries',cat:'Lead Management',tag:'SOP',summary:'Keep lead Active — do not change to Vendor status; use DNR if needed. Collect client name whenever possible. Without client info, all follow-ups go through the realtor. Tours can still be booked using the realtor\'s name. Document realtor representation clearly in notes.'},
  // Resident & Application Handling
  {id:7,title:'Handling Calls Related to Resident Billing',cat:'Resident & Application',tag:'SOP',summary:'Billing, charges, notices, payments → route to BM Team. One transfer attempt only. If BM doesn\'t answer → Experience Chat + create BM task. Former resident billing → Antonette (Shannon backup). BM task deadlines: 24hrs urgent, 48hrs standard. Escalate to Shannon if delayed.'},
  {id:8,title:'Handling Resident Calls from a Different Phone Number',cat:'Resident & Application',tag:'SOP',summary:'Verify residency in Yardi including roommate section. If resident\'s own new/alternate number → update in Yardi and Funnel, then merge guest cards. If using someone else\'s phone → do not merge. When uncertain → loop in RES team before acting.'},

function toCsvUrl(url){
  try{
    const m=url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
    if(!m)return null;
    const id=m[1];
    const gm=url.match(/[#&]gid=(\d+)/);
    return`https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gm?gm[1]:'0'}`;
  }catch(e){return null;}
}
async function syncSheet(){
  if(!state.sheetUrl){state.syncMsg='Paste your Google Sheet link first.';state.syncStatus='error';render();return;}
  const csvUrl=toCsvUrl(state.sheetUrl);
  if(!csvUrl){state.syncMsg='Invalid Google Sheets URL.';state.syncStatus='error';render();return;}
  state.syncStatus='loading';state.syncMsg='';render();
  try{
    const res=await fetch(csvUrl);
    if(!res.ok)throw new Error(`Could not access sheet (${res.status}).`);
    const text=await res.text();
    const lines=text.split('\n').filter(l=>l.trim());
    if(lines.length<2)throw new Error('Sheet appears empty.');
    const headers=lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/"/g,''));
    const ki=headers.findIndex(h=>h.includes('kpi')||h.includes('metric')||h.includes('name'));
    const si=headers.findIndex(h=>h.includes('score')||h.includes('actual')||h.includes('value'));
    if(ki===-1||si===-1)throw new Error('Sheet needs columns: KPI and Score.');
    const u={...state.teamScores};
    lines.slice(1).forEach(line=>{
      const cols=line.split(',').map(c=>c.trim().replace(/"/g,''));
      const n=(cols[ki]||'').toLowerCase();
      const v=parseFloat((cols[si]||'').replace('%',''))||0;
      if(n.includes('call')||n.includes('completion'))u.call_completion=v;
      if(n.includes('lead eng')||n.includes('engagement'))u.lead_engagement=v;
      if(n.includes('task'))u.task_management=v;
      if(n.includes('scheduled')||n.includes('lead to sch'))u.lead_to_scheduled=v;
      if(n.includes('lead to tour')&&!n.includes('sched'))u.lead_to_tour=v;
    });
    state.teamScores=u;
    state.syncStatus='success';state.syncMsg='Scores synced!';
    state.lastSynced=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    setTimeout(()=>{state.syncStatus='idle';state.syncMsg='';render();},5000);
  }catch(err){state.syncStatus='error';state.syncMsg=err.message||'Sync failed.';}
  render();
}
function handleFenixUpload(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const lines=ev.target.result.split('\n').filter(l=>l.trim());
      if(lines.length<2){state.fenixMsg='File appears empty.';render();return;}
      const h=lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/"/g,''));
      const ni=h.findIndex(x=>x.includes('agent')||x.includes('name'));
      const si=h.findIndex(x=>x.includes('score')||x.includes('percent')||x.includes('%'));
      if(ni===-1||si===-1){state.fenixMsg='CSV needs: Agent Name, Score.';render();return;}
      const parsed=lines.slice(1).map(l=>{const c=l.split(',').map(x=>x.trim().replace(/"/g,''));return{name:c[ni]||'',fenix:parseFloat(c[si])||0};}).filter(a=>a.name);
      state.agents=state.agents.map(a=>{const m=parsed.find(p=>p.name.toLowerCase()===a.name.toLowerCase());return m?{...a,fenix_scored_calls:m.fenix}:a;});
      const avg=Math.round(parsed.reduce((s,a)=>s+a.fenix,0)/parsed.length*10)/10;
      state.teamScores.fenix_scored_calls=avg;
      state.fenixMsg=`✓ ${parsed.length} agents loaded`;
      setTimeout(()=>{state.fenixMsg='';render();},5000);
    }catch(e){state.fenixMsg='Could not read file.';}
    render();
  };
  reader.readAsText(file);
}

function renderAgentTable(kpiId,goal,unit){
  const sorted=[...state.agents].sort((a,b)=>(b[kpiId]||0)-(a[kpiId]||0));

        return`<div class="agent-row" style="background:${i%2===0?'#fff':'#fafafa'}">

function renderManualTab(data,tabColor){
  return`

      return`<div class="kpi-card${m.actual>0?(og?' on-goal':' below'):''}" style="margin-bottom:8px">

function saveMetric(id){
  const data=state.scTab==='monthend'?state.monthend:state.quarterly;
  const idx=data.findIndex(m=>m.id===id);
  if(idx!==-1){data[idx]={...data[idx],actual:parseFloat(document.getElementById('ea_'+id).value)||0,goal:parseFloat(document.getElementById('eg_'+id).value)||0};}
  state.editingMetric=null;render();
}

function submitEOD(){
  if(!state.eodName){alert('Please select your name before submitting.');return;}
  const submission={
    name:state.eodName,
    date:state.eodDate||new Date().toISOString().split('T')[0],
    submittedAt:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),
    dashPhoto:state.eodDashPhotoName,
    callsHandled:state.eodCallsHandled,
    toursScheduled:state.eodToursScheduled,
    toursCompleted:state.eodToursCompleted,
    followUps:state.eodFollowUps,
    huddleTopic:state.eodHuddleTopic,
    huddleCovered:state.eodHuddleCovered,
    wins:state.eodWins,
    challenges:state.eodChallenges,
  };
  eodSubmissions.push(submission);
  // Reset form
  state.eodName='';state.eodDate='';state.eodDashPhoto=null;state.eodDashPhotoName='';
  state.eodHuddleTopic='';state.eodHuddleCovered='';
  state.eodCallsHandled='';state.eodToursScheduled='';state.eodToursCompleted='';state.eodFollowUps='';
  state.eodWins='';state.eodChallenges='';
  state.eodSubmitted=true;
  render();
}

          <button style="width:100%;padding:9px;background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;color:#374151;display:flex;align-items:center;justify-content:center;gap:8px">
            <strong>G</strong> Sign in with Google
          </button>
        </div>
        <div style="margin-top:18px;padding-top:14px;border-top:1px solid #f1f5f9;font-size:11px;color:#64748b;text-align:center">Access issues? Contact Rowel · PEC Hub v1.0</div>
      </div>
    </div>`;
}
function doLoginPage(){
  const email=state.loginEmail;
  if(!email.includes('@')){state.loginError='Please enter a valid email address.';render();return;}
  state.loginError='';state.loginLoading=true;render();
  setTimeout(()=>{
    if(email.toLowerCase().includes('avanti')||email.toLowerCase().includes('rowel')){
      state.manager={name:'Rowel De La Trinidad',email,role:'Lead Management Manager'};
      state.loginLoading=false;
    }else{state.loginError='Access restricted to authorized managers.';state.loginLoading=false;}
    render();
  },1200);
}

const COACHING=[
  {id:1,name:'Agent 1',date:'Jun 2, 2026',type:'1:1',notes:'Strong improvement on follow-up cadence. Discussed tone calibration on re-engagement calls. Action: practice objection scripts this week.'},

  {id:4,name:'Agent 4',date:'May 22, 2026',type:'Coaching',notes:'Addressed scheduling errors. SOPs reviewed together. Action: double-check confirmation texts against template before sending.'},
];

          </div>
          <p style="font-size:12px;color:rgba(255,255,255,.55);padding-left:30px">1:1 notes, performance records, and coaching history</p>
        </div>
        <div style="text-align:right">
          <div style="font-size:12px;font-weight:700;color:rgba(255,255,255,.9)">${state.manager.name}</div>
          <div style="font-size:11px;color:rgba(255,255,255,.5);margin-bottom:6px">${state.manager.role}</div>
          <button class="signout-btn" onclick="state.manager=null;showPage('home')">Sign out</button>

    <div class="content">

        <div class="card${state.expandedCoaching===l.id?' open':''}" style="${state.expandedCoaching===l.id?'border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.1)':''}">
          <div class="card-header" onclick="state.expandedCoaching=state.expandedCoaching===${l.id}?null:${l.id};render()">
            <div class="card-left">
              <div style="width:32px;height:32px;border-radius:50%;background:#ede9fe;color:#7c3aed;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">
                ${l.name.split(' ').map(n=>n[0]).join('')}
              </div>
              <div>
                <div style="font-size:13px;font-weight:700;color:#0f172a">${l.name}</div>
                <div style="font-size:11px;color:#64748b">${l.date}</div>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:8px">${badge(l.type)}<span class="chevron${state.expandedCoaching===l.id?' open':''}">▾</span></div>
          </div>
          ${state.expandedCoaching===l.id?`
            <div class="card-body">

              <div style="display:flex;gap:8px;margin-top:12px">

      <button style="margin-top:16px;width:100%;padding:11px;background:#0f1e3d;color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer">

}

// ── RENDER ────────────────────────────────────────────────────────
function renderPage(){
  let html='';
  switch(state.page){
    case 'home':      html=renderHome();break;
    case 'kb':        html=renderKB();break;
    case 'spiels':    html=renderSpiels();break;
    case 'videos':    html=renderVideos();break;
    case 'scorecard': html=renderScorecard();break;
    case 'eod':       html=renderEOD();break;
    case 'coaching':  html=state.manager?renderCoaching():renderLogin();break;
    default:          html=renderHome();
  }
  document.getElementById('pageContent').innerHTML=html;
}
function render(){renderNav();renderPage();}
render();
</script>
