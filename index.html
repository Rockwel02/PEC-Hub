<!DOCTYPE html>
<html lang="en">
<head>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>

<body>
<div class="hub">
  <nav id="nav">
    <div class="nav-logo" onclick="showPage('home')">
      <span>🏢</span>
      <span>PEC Hub</span>
      <span class="nav-badge">Avanti</span>
    </div>
    <div class="nav-links" id="navLinks"></div>
  </nav>
  <div class="page" id="pageContent"></div>
  <footer>
    <span>PEC Hub · Prospect Experience Coordinators · Avanti Residential</span>
    <span>Progress, not Perfection.</span>
  </footer>
</div>
<div id="presenceBar" style="display:none;position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:#0f1e3d;border-radius:30px;padding:8px 16px;gap:10px;box-shadow:0 4px 16px rgba(0,0,0,.25);z-index:500;max-width:90vw;overflow-x:auto"></div>
<script>
// ── ONLINE PRESENCE (who's currently on the hub) ─────────────────
// Each visitor writes a small "I'm here" heartbeat to Firestore every
// 15 seconds while the hub is open, and reads everyone's heartbeats
// every 10 seconds to build the "who's online" bar. Anyone whose last
// heartbeat is older than 30 seconds is treated as offline (covers the
// case where someone just closes the tab without a clean disconnect).
const VISITOR_NAME_KEY = 'pechub_visitor_name';
const PRESENCE_HEARTBEAT_MS = 15 * 1000;
const PRESENCE_REFRESH_MS = 10 * 1000;
const PRESENCE_STALE_MS = 30 * 1000;

let presenceHeartbeatInterval = null;
let presenceRefreshInterval = null;

function getVisitorName(){
  try{ return localStorage.getItem(VISITOR_NAME_KEY) || null; }catch(e){ return null; }
}
function setVisitorName(name){
  try{ localStorage.setItem(VISITOR_NAME_KEY, name); }catch(e){}
}

async function sendPresenceHeartbeat(){
  const name = getVisitorName();
  if(!name) return;
  try{
    await db.collection('pechub_presence').doc(name).set({
      name, lastSeen: Date.now(),
    });
  }catch(e){
    console.warn('Presence heartbeat failed:', e);
  }
}

async function refreshOnlineVisitors(){
  try{
    const snapshot = await db.collection('pechub_presence').get();
    const now = Date.now();
    const online = [];
    snapshot.forEach(doc=>{
      const data = doc.data();
      if(data && data.lastSeen && (now - data.lastSeen) < PRESENCE_STALE_MS){
        online.push(data.name);
      }
    });
    state.onlineVisitors = online;
    renderPresenceBar();
  }catch(e){
    console.warn('Could not refresh online visitors:', e);
  }
}

function startPresenceSystem(){
  const name = getVisitorName();
  if(!name){
    promptForVisitorName();
    return;
  }
  sendPresenceHeartbeat();
  refreshOnlineVisitors();
  if(presenceHeartbeatInterval) clearInterval(presenceHeartbeatInterval);
  if(presenceRefreshInterval) clearInterval(presenceRefreshInterval);
  presenceHeartbeatInterval = setInterval(sendPresenceHeartbeat, PRESENCE_HEARTBEAT_MS);
  presenceRefreshInterval = setInterval(refreshOnlineVisitors, PRESENCE_REFRESH_MS);
}

function promptForVisitorName(){
  // Build a friendly name picker using the real team roster
  const names = TEAM.map(t=>t.name);
  const overlay = document.createElement('div');
  overlay.id = 'visitorNameOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(15,30,61,.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:16px;padding:28px;max-width:360px;width:100%;text-align:center">
      <div style="font-size:36px;margin-bottom:10px">👋</div>
      <div style="font-size:16px;font-weight:800;color:#0f172a;margin-bottom:6px">Welcome to PEC Hub!</div>
      <div style="font-size:12px;color:#64748b;margin-bottom:16px;line-height:1.6">Pick your name so your teammates can see you're online. We'll remember it next time.</div>
      <select id="visitorNameSelect" style="width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:13px;margin-bottom:14px">
        <option value="">Select your name...</option>
        ${names.map(n=>`<option value="${n}">${n}</option>`).join('')}
      </select>
      <button id="visitorNameSubmit" style="width:100%;padding:11px;background:#0f1e3d;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer">Continue →</button>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('visitorNameSubmit').onclick = ()=>{
    const sel = document.getElementById('visitorNameSelect').value;
    if(!sel){ alert('Please select your name first.'); return; }
    setVisitorName(sel);
    document.body.removeChild(overlay);
    startPresenceSystem();
  };
}

function renderPresenceBar(){
  const container = document.getElementById('presenceBar');
  if(!container) return;
  const online = state.onlineVisitors || [];
  if(online.length === 0){
    container.innerHTML = '';
    container.style.display = 'none';
    return;
  }
  container.style.display = 'flex';
  container.innerHTML = online.map(name=>{
    const animal = ANIMAL_AVATARS[name] || '🐾';
    const firstName = name.split(' ')[0];
    return `<div title="${name} is online" style="display:flex;flex-direction:column;align-items:center;gap:2px">
      <div style="width:32px;height:32px;border-radius:50%;background:#fff;border:2px solid #16a34a;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 1px 4px rgba(0,0,0,.15)">${animal}</div>
      <div style="font-size:8px;color:#fff;font-weight:600;max-width:40px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${firstName}</div>
    </div>`;
  }).join('');
}

// ── PERSISTED MANAGER LOGIN ──────────────────────────────────────
// Stores manager login in localStorage so closing/reopening the browser
// keeps you signed in. This is local to this specific browser/device —
// anyone else using the same browser would also appear logged in unless
// you sign out first.
const MANAGER_SESSION_KEY = 'pechub_manager_session';

function persistManagerSession(managerObj){
  try{
    localStorage.setItem(MANAGER_SESSION_KEY, JSON.stringify(managerObj));
  }catch(e){
    console.warn('Could not persist login — localStorage unavailable:', e);
  }
}
function loadPersistedManagerSession(){
  try{
    const raw = localStorage.getItem(MANAGER_SESSION_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){
    return null;
  }
}
function clearPersistedManagerSession(){
  try{
    localStorage.removeItem(MANAGER_SESSION_KEY);
  }catch(e){}
}

// All manager-editable data lives under the "pechub" collection, one doc per item:
//   - spiel_recordings:      { "17": "https://drive.google.com/...", "9": "..." }  (keyed by spiel id)
//   - discovery_recordings:  { "1": "https://drive.google.com/..." }                (keyed by question id)
//   - call_listening_links:  { sheetUrl: "...", folderUrl: "..." }
//   - manager_auth:          { password: "..." }
async function saveToFirestore(docId, data){
  try{
    await db.collection('pechub').doc(docId).set(data, {merge:true});
    return true;
  }catch(err){
    console.error('Firestore save failed:', err);
    return false;
  }
}
async function savePeriodHistory(){
  const saved = await saveToFirestore('scorecard_period_history', {
    monthendHistory: state.monthendHistory,
    quarterlyHistory: state.quarterlyHistory,
  });
  if(!saved) console.warn('Period history saved locally but failed to sync to Firestore — it may not persist after refresh.');
  return saved;
}
async function loadAllFromFirestore(){
  try{
    const snapshot = await db.collection('pechub').get();
    const result = {};
    snapshot.forEach(doc => { result[doc.id] = doc.data(); });
    return result;
  }catch(err){
    console.error('Firestore load failed:', err);
    return {};
  }
}
async function loadOneFromFirestore(docId){
  try{
    const doc = await db.collection('pechub').doc(docId).get();
    return doc.exists ? doc.data() : {};
  }catch(err){
    console.error('Firestore load failed for', docId, ':', err);
    return {};
  }
}

// Pulls saved spiel recordings, discovery recordings, and call listening links
// from Firestore and applies them on top of the hub's baked-in defaults.
// Runs once on page load, before the first render, so everyone sees the same data.
async function hydrateFromFirestore(){
  const remote = await loadAllFromFirestore();

  if(remote.spiel_recordings){
    Object.entries(remote.spiel_recordings).forEach(([id, url])=>{
      const spiel = SPIELS.find(s=>String(s.id)===String(id));
      if(spiel) spiel.recordingUrl = url;
    });
  }
  if(remote.discovery_recordings){
    Object.entries(remote.discovery_recordings).forEach(([id, url])=>{
      const q = DISCOVERY_QUESTIONS.find(s=>String(s.id)===String(id));
      if(q) q.recordingUrl = url;
    });
  }
  if(remote.call_listening_links){
    state.clwSheetUrl  = remote.call_listening_links.sheetUrl  || state.clwSheetUrl;
    state.clwFolderUrl = remote.call_listening_links.folderUrl || state.clwFolderUrl;
  }
  if(remote.manager_auth && remote.manager_auth.password){
    MANAGER_PASSWORD = remote.manager_auth.password;
  }
  if(remote.announcements_list && Array.isArray(remote.announcements_list.items)){
    // Merge saved announcements in, avoiding duplicates with the default seed announcement
    const savedItems = remote.announcements_list.items;
    const existingIds = new Set(state.announcements.map(a=>a.id));
    savedItems.forEach(item=>{
      if(!existingIds.has(item.id)){
        state.announcements.push(item);
      }
    });
  }
  if(remote.scorecard_period_history){
    if(Array.isArray(remote.scorecard_period_history.monthendHistory) && remote.scorecard_period_history.monthendHistory.length){
      state.monthendHistory = remote.scorecard_period_history.monthendHistory;
    }
    if(Array.isArray(remote.scorecard_period_history.quarterlyHistory) && remote.scorecard_period_history.quarterlyHistory.length){
      state.quarterlyHistory = remote.scorecard_period_history.quarterlyHistory;
    }
  }
  if(remote.scorecard_sheet_link && remote.scorecard_sheet_link.sheetUrl){
    state.sheetUrl = remote.scorecard_sheet_link.sheetUrl;
    // If we're already sitting on the Scorecard page when this loads, start auto-sync now
    if(state.page === 'scorecard') manageScorecardAutoSync('scorecard');
  }
}

const CALL_SCRIPTS = [
  {id:1, cat:'Prospect Related', title:'Tour & Leasing Intent', opening:'Prospect called inquiring about leasing and expressed interest in touring a unit. I gathered their preferences and reviewed available options. Offered to schedule a tour.', yesBranch:'tour scheduled', noBranch:'not ready to commit to a tour yet. Asked if I can follow up at a later date to check their interest. Prospect declined further contact - No further action required', dnr:'Tour & Leasing Intent'},
  {id:2, cat:'Prospect Related', title:'Prospect - New Inquiry', opening:'Prospect called as a new inquiry asking about availability and general community information. I provided community details, pricing, and answered their initial questions. Offered to schedule a tour.', yesBranch:'tour scheduled. Will follow up to confirm attendance', noBranch:'just gathering information for now. Asked if I can follow up to check their interest. Prospect declined further contact - No further action required', dnr:'New Inquiry'},
  {id:3, cat:'Prospect Related', title:'Prospect - Follow Up', opening:'Prospect called following up on a previous inquiry to check on availability or next steps. I reviewed their prior notes and provided an update. Offered to move forward with scheduling a tour or application.', yesBranch:'proceeding with next steps. Will follow up to confirm completion', noBranch:'still deciding. Asked if I can follow up to check their interest. Prospect declined further contact - No further action required', dnr:'Follow Up'},
  {id:4, cat:'Prospect Related', title:'Canceled Tour', opening:'Prospect called to cancel their scheduled tour. I confirmed the cancellation and asked about their continued interest in the community. Offered to reschedule for a more convenient time.', yesBranch:'tour rescheduled. Will follow up to confirm attendance', noBranch:'no longer interested at this time. Asked if I can follow up to check their interest. Prospect declined further contact - No further action required', dnr:'Canceled Tour'},
  {id:5, cat:'Prospect Related', title:'Prospect - Needs Qualification', opening:'Prospect called asking about what they need to qualify for one of our communities. I explained the general qualification process and what documentation may be required. Offered to walk them through our rental criteria in detail.', yesBranch:'criteria reviewed and prospect wants to proceed. Will follow up to confirm interest', noBranch:'prospect wants to think it over. Asked if I can follow up to check their interest. Prospect declined further contact - No further action required', dnr:'Needs Qualification'},
  {id:6, cat:'Prospect Related', title:'Prospect - Rental Criteria Questions', opening:'Prospect called to inquire about our rental qualifications, specifically about Income/Credit Score/Rental History/Criminal/Eviction. I provided proper expectations and read our rental criteria verbatim. I also walked the prospect through where they can find it online. Offered to send the rental criteria via email.', yesBranch:'rental criteria sent. Will follow up to confirm interest', noBranch:'never mind. Asked if I can follow up to check their interest. Prospect declined - No further action required', dnr:'Rental Criteria Questions'},
  {id:7, cat:'Prospect Related', title:'Prospect - Outside Budget', opening:'Prospect called inquiring about pricing and shared that the rate is outside their current budget. I acknowledged their concern and explored other available unit types or move-in dates that may fit better. Offered to keep them updated on pricing changes or specials.', yesBranch:'prospect wants to stay informed of pricing updates. Will follow up with future pricing or specials', noBranch:'budget will not work for this community. Asked if I can follow up to check their interest. Prospect declined further contact - No further action required', dnr:'Outside Budget'},
  {id:8, cat:'Prospect Related', title:'Prospect - No Availability Match', opening:'Prospect called looking for a specific unit type or move-in date that we currently do not have available. I confirmed what is available and discussed alternative options that may fit their needs. Offered to notify them once a matching unit becomes available.', yesBranch:'prospect wants to be notified when availability matches their needs. Will follow up once a unit becomes available', noBranch:'prospect will look elsewhere. Asked if I can follow up to check their interest. Prospect declined further contact - No further action required', dnr:'No Availability Match'},
  {id:9, cat:'Prospect Related', title:'Prospect - Shopping Around', opening:'Prospect called comparing our community with other options they are considering. I highlighted our community\'s features, amenities, and any current specials to help with their decision. Offered to answer any additional questions or schedule a tour.', yesBranch:'prospect wants to schedule a tour to compare in person. Will follow up to confirm attendance', noBranch:'still comparing other communities. Asked if I can follow up to check their interest. Prospect declined further contact - No further action required', dnr:'Shopping Around'},
  {id:10, cat:'Prospect Related', title:'Prospect - Not Moving Yet', opening:'Prospect called to inquire but shared that they are not planning to move for some time. I gathered their target move-in timeframe and noted their interest for future follow-up. Offered to check back in closer to their move date.', yesBranch:'prospect wants a follow-up closer to their move-in date. Will follow up at the appropriate time', noBranch:'prospect prefers not to be contacted until they reach out. Prospect declined further contact - No further action required', dnr:'Not Moving Yet'},
  {id:11, cat:'Prospect Related', title:'Prospect - Already Leased Elsewhere', opening:'Prospect called to inform us that they have already signed a lease at another community. I thanked them for letting us know and confirmed there was no further action needed on our end. Offered to keep their information on file in case their plans change.', yesBranch:'prospect is open to being contacted again in the future. Will follow up if their plans change', noBranch:'prospect has fully committed elsewhere. Prospect declined further contact - No further action required', dnr:'Already Leased Elsewhere'},
  {id:12, cat:'Prospect Related', title:'Prospect - Duplicate Inquiry', opening:'Prospect called regarding an inquiry that was already submitted and is being handled by our team. I confirmed their information matched an existing inquiry and reviewed the status with them. Offered to consolidate their inquiry and continue assisting them directly.', yesBranch:'prospect confirmed and wants to proceed with this inquiry. Will follow up to confirm interest', noBranch:'prospect was already assisted and has no further questions. Prospect declined further contact - No further action required', dnr:'Duplicate Inquiry'},
  {id:13, cat:'Prospect Related', title:'Scheduled Tour', opening:'Prospect called to schedule a tour of the community. I confirmed their availability and booked a tour at a time that worked for them. Offered to send a confirmation with the date, time, and any preparation details.', yesBranch:'confirmation sent and tour is scheduled. Will follow up to confirm attendance', noBranch:'prospect wants to think about timing first. Asked if I can follow up to check their interest. Prospect declined further contact - No further action required', dnr:'Scheduled Tour'},
  {id:14, cat:'Prospect Related', title:'Rescheduled Tour', opening:'Prospect called to reschedule their previously booked tour. I confirmed their new preferred date and time and updated the schedule accordingly. Offered to send an updated confirmation.', yesBranch:'confirmation sent and tour rescheduled. Will follow up to confirm attendance', noBranch:'prospect needs to confirm a new date later. Asked if I can follow up to check their interest. Prospect declined further contact - No further action required', dnr:'Rescheduled Tour'},
  {id:15, cat:'Prospect Related', title:'Prospect already at the leasing office', opening:'Prospect called or was flagged as already being on-site at the leasing office for their scheduled visit. I confirmed with the onsite team that the prospect had arrived and was being assisted in person. No further phone follow-up needed at this time. Offered to check back after their visit to see how it went.', yesBranch:'prospect is open to a follow-up after their visit. Will follow up after the on-site visit', noBranch:'prospect\'s needs were fully addressed on-site. Prospect declined further contact - No further action required', dnr:'Already at Leasing Office'},
  {id:16, cat:'Prospect Related', title:'No Show - Prospect', opening:'Prospect did not show up for their scheduled tour and I followed up to check in. I reached out to understand if they still wanted to visit and offered to reschedule.', yesBranch:'prospect wants to reschedule their tour. Will follow up to confirm the new tour date', noBranch:'prospect is no longer interested in touring. Asked if I can follow up to check their interest. Prospect declined further contact - No further action required', dnr:'No Show'},
  {id:17, cat:'Prospect Related', title:'Same Day Tour Request', opening:'Prospect called requesting a tour for the same day. I checked availability with the onsite team and worked to accommodate their request. Offered to confirm a same-day tour time.', yesBranch:'same-day tour confirmed. Will follow up to confirm attendance', noBranch:'same-day timing did not work and prospect will reach out to reschedule. Prospect declined further contact - No further action required', dnr:'Same Day Tour Request'},
  {id:18, cat:'Prospect Related', title:'Virtual Tour Request', opening:'Prospect called requesting a virtual tour option since they are unable to visit in person. I explained our current virtual tour availability and offered alternative ways to view the community, such as photos or video walkthroughs.', yesBranch:'prospect wants the virtual materials sent over. Will follow up to confirm receipt and interest', noBranch:'prospect prefers to wait until they can visit in person. Asked if I can follow up to check their interest. Prospect declined further contact - No further action required', dnr:'Virtual Tour Request'},
  {id:19, cat:'Prospect Related', title:'Application Stage but Not Submitted', opening:'Prospect called regarding their application that was started but not yet submitted. I reviewed where they left off and helped clarify any remaining steps. Offered to assist them in completing and submitting the application.', yesBranch:'prospect completed and submitted the application. Will follow up to confirm screening status', noBranch:'prospect needs more time before submitting. Asked if I can follow up to check their interest. Prospect declined further contact - No further action required', dnr:'Application Not Submitted'},
  {id:20, cat:'Prospect Related', title:'Prospect - Application Questions', opening:'Prospect called with questions about the application process, required documents, or timeline. I answered their questions and clarified the steps involved in applying. Offered to assist them in starting or completing their application.', yesBranch:'prospect wants to proceed with the application. Will follow up to confirm submission', noBranch:'prospect wants to review the requirements first. Asked if I can follow up to check their interest. Prospect declined further contact - No further action required', dnr:'Application Questions'},
  {id:21, cat:'Prospect Related', title:'Prospect - Qualification Requirements', opening:'Prospect called asking specifically what qualification requirements apply to their situation. I reviewed the relevant criteria with them based on their circumstances. Offered to send the full rental criteria for their reference.', yesBranch:'rental criteria sent and prospect wants to proceed. Will follow up to confirm interest', noBranch:'prospect is unsure if they will qualify. Asked if I can follow up to check their interest. Prospect declined further contact - No further action required', dnr:'Qualification Requirements'},
  {id:22, cat:'Prospect Related', title:'Prospect - Fee and Deposit Inquiry', opening:'Prospect called asking about application fees, deposit amounts, or move-in costs. I provided a breakdown of the applicable fees and deposit requirements. Offered to send a written summary for their records.', yesBranch:'summary sent and prospect wants to proceed. Will follow up to confirm interest', noBranch:'fees are higher than expected. Asked if I can follow up to check their interest. Prospect declined further contact - No further action required', dnr:'Fee and Deposit Inquiry'},
  {id:23, cat:'Prospect Related', title:'Prospect - Guarantor Questions', opening:'Prospect called asking about adding a guarantor to their application. I explained our guarantor policy, including the income or asset requirements. Offered to send the guarantor requirements in writing.', yesBranch:'requirements sent and prospect has a guarantor in mind. Will follow up to confirm interest', noBranch:'prospect does not have anyone who can qualify as a guarantor. Asked if I can follow up to check their interest. Prospect declined further contact - No further action required', dnr:'Guarantor Questions'},
  {id:24, cat:'Prospect Related', title:'Prospect - Section 8 / Voucher Inquiry', opening:'Prospect called inquiring about using a Section 8 or housing voucher for their lease. I confirmed that vouchers are accepted as a source of income and that they will still be screened, then looped in our Onsite Team since they handle the specifics on that side. Offered to schedule a tour or connect them with Onsite by phone.', yesBranch:'prospect wants to schedule a tour and proceed with prequalification. Will follow up to confirm interest', noBranch:'prospect needs to confirm voucher details first. Asked if I can follow up to check their interest. Prospect declined further contact - No further action required', dnr:'Section 8 / Voucher Inquiry'},
  {id:25, cat:'Prospect Related', title:'Prospect - out of state and will not tour', opening:'Prospect called from out of state and shared that they will not be able to tour in person before deciding. I offered alternative ways to view the community, such as photos, video walkthroughs, or a virtual tour if available.', yesBranch:'prospect wants the materials sent and will proceed based on that. Will follow up to confirm interest', noBranch:'prospect wants to wait until they are in the area. Asked if I can follow up to check their interest. Prospect declined further contact - No further action required', dnr:'Out of State, Will Not Tour'},
  {id:26, cat:'Prospect Related', title:'Prospect - Income Based Community', opening:'Prospect called asking about income-based or affordable housing options. I explained whether the community they inquired about offers income-based units and what the qualification process looks like. Offered to send program details or qualification criteria.', yesBranch:'details sent and prospect wants to proceed. Will follow up to confirm interest', noBranch:'prospect does not qualify for the program. Asked if I can follow up to check their interest. Prospect declined further contact - No further action required', dnr:'Income Based Community'},
  {id:27, cat:'Prospect Related', title:'Prospect - Confirmed tour', opening:'Prospect called to confirm their upcoming scheduled tour. I verified the date and time and reaffirmed the appointment with them. Offered to send a reminder closer to the tour date.', yesBranch:'reminder requested and tour remains confirmed. Will follow up to confirm attendance', noBranch:'prospect needed to adjust the tour time. Asked if I can follow up to check their interest. Prospect declined further contact - No further action required', dnr:'Confirmed Tour'},
  {id:28, cat:'Prospect Related', title:'Prospect - Looking for short-term lease', opening:'Prospect called asking about short-term lease options. I explained our available lease term options and whether short-term leasing is offered at the community in question. Offered to share pricing for shorter lease terms if available.', yesBranch:'pricing sent and prospect wants to proceed. Will follow up to confirm interest', noBranch:'short-term lease is not available or did not fit their needs. Asked if I can follow up to check their interest. Prospect declined further contact - No further action required', dnr:'Short-Term Lease Inquiry'},
  {id:29, cat:'Prospect Related', title:'Prospect - Lack of amenities', opening:'Prospect called expressing that the community\'s current amenities do not fully meet their needs. I listened to their specific concerns and highlighted any amenities or features they may not have been aware of. Offered to follow up if new amenities or services become available.', yesBranch:'prospect wants to be kept informed of amenity updates. Will follow up with any updates', noBranch:'the lack of amenities is a deciding factor against this community. Prospect declined further contact - No further action required', dnr:'Lack of Amenities'},
  {id:30, cat:'Prospect Related', title:'Prospect - wish to speak to someone in CT', opening:'Prospect called requesting to speak with someone specifically on site. I still tried to provide assistance by asking what the call was about, in case it was something we could answer directly. Prospect provided the reason for calling, but I was not able to resolve it on our end. No, prospect declined to let me try to assist further, so I attempted to transfer the call to our CT/Community Team on site. No answer on transfer. Task created for the CT team to follow up.', yesBranch:'prospect is open to a callback. Will follow up to confirm the callback occurred', noBranch:'prospect will reach out again later. Prospect declined further contact - No further action required', dnr:'Requested CT Team'},
  {id:31, cat:'Prospect Related', title:'Prospect - Pet Policy', opening:'Prospect called asking about our pet policy, including breed restrictions, pet fees, or pet rent. I provided the relevant pet policy details for the community they inquired about. Offered to send the full pet policy in writing.', yesBranch:'pet policy sent and prospect wants to proceed. Will follow up to confirm interest', noBranch:'prospect\'s pet does not meet our policy requirements. Asked if I can follow up to check their interest. Prospect declined further contact - No further action required', dnr:'Pet Policy'},
  {id:32, cat:'Prospect Related', title:'Prospect - Need Spanish agent', opening:'Prospect called requesting assistance in Spanish, which fell outside our regular LMS team\'s scope of support. I provided basic details and attempted to transfer the call to a Spanish-speaking agent. No answer on transfer. Task created for a Spanish-speaking agent to follow up.', yesBranch:'prospect is open to a callback in Spanish. Will follow up to confirm the callback occurred', noBranch:'prospect will call back another time. Prospect declined further contact - No further action required', dnr:'Spanish Agent Requested'},
  {id:33, cat:'Prospect Related', title:'Prospect - Toured', opening:'Prospect called following their completed tour to ask additional questions or share feedback. I addressed their questions and gathered their impressions of the visit. Offered to help them move forward with the application if they are ready.', yesBranch:'prospect wants to proceed with the application. Will follow up to confirm submission', noBranch:'prospect needs more time to decide after touring. Asked if I can follow up to check their interest. Prospect declined further contact - No further action required', dnr:'Post-Tour Follow Up'},
  {id:34, cat:'Applicant Related', title:'Applicant - Application Submitted', opening:'Applicant called to confirm that their application was successfully submitted. I verified the submission in our system and confirmed receipt with the applicant. Offered to provide an estimated timeline for screening results.', yesBranch:'applicant wants updates on the screening timeline. Will follow up once results are available', noBranch:'applicant will check back on their own. Applicant declined further contact - No further action required', dnr:'Application Submitted'},
  {id:35, cat:'Applicant Related', title:'Applicant - Application In Progress', opening:'Applicant called regarding an application that is still in progress and not yet complete. I reviewed what steps remain and helped clarify any outstanding requirements. Offered to assist them in completing the remaining steps.', yesBranch:'applicant completed the remaining steps. Will follow up to confirm full submission', noBranch:'applicant needs more time to gather documents. Asked if I can follow up to check their progress. Applicant declined further contact - No further action required', dnr:'Application In Progress'},
  {id:36, cat:'Applicant Related', title:'Applicant - New Inquiry', opening:'Applicant called as a new inquiry asking how to begin the application process. I explained the steps required to apply and what documentation would be needed. Offered to send the application link directly.', yesBranch:'application link sent. Will follow up to confirm submission', noBranch:'applicant wants to review the requirements first. Asked if I can follow up to check their interest. Applicant declined further contact - No further action required', dnr:'New Application Inquiry'},
  {id:37, cat:'Applicant Related', title:'Applicant - Screening in Review', opening:'Applicant called asking for an update while their screening is still in review. I confirmed the screening was in progress and explained that results typically take up to 5 business days. Offered to follow up once a decision is made.', yesBranch:'applicant wants to be notified as soon as results are in. Will follow up once screening is complete', noBranch:'applicant will wait without further contact. Applicant declined further contact - No further action required', dnr:'Screening in Review'},
  {id:38, cat:'Applicant Related', title:'Applicant - Approved', opening:'Applicant called after learning their application was approved, with questions about next steps. I confirmed the approval and walked them through the lease signing process and move-in requirements. Offered to coordinate next steps with the Onsite team.', yesBranch:'applicant wants to proceed with lease signing. Will follow up to confirm scheduling with Onsite', noBranch:'applicant needs time before moving forward. Asked if I can follow up to check their timeline. Applicant declined further contact - No further action required', dnr:'Approved'},
  {id:39, cat:'Applicant Related', title:'Applicant - Conditionally Approved', opening:'Applicant called regarding a conditional approval and asked what additional steps are needed to finalize it. I explained the specific conditions that need to be satisfied, such as an additional deposit or guarantor. Offered to clarify the requirements in writing.', yesBranch:'applicant wants to proceed and meet the conditions. Will follow up to confirm completion', noBranch:'applicant is unsure if they can meet the conditions. Asked if I can follow up to check their decision. Applicant declined further contact - No further action required', dnr:'Conditionally Approved'},
  {id:40, cat:'Applicant Related', title:'Applicant - Denied Inquiry', opening:'Applicant called asking about the reason behind a denial on their application. I checked the application and confirmed the decision was based on the applicant\'s credit, criminal, or eviction screening through TransUnion. I explained that our team is not able to review or override the decision and advised the applicant to contact TransUnion directly using the dispute information provided in their results email. Offered to follow up after they\'ve had a chance to reach out to TransUnion.', yesBranch:'applicant will contact TransUnion and wants a follow-up. Will follow up to check the outcome', noBranch:'applicant understood and had no further questions. Applicant declined further contact - No further action required', dnr:'Unqualified'},
  {id:41, cat:'Applicant Related', title:'Applicant - Refund Inquiry', opening:'Applicant called asking about a refund to their application fee, since they got denied as a resident. I provided basic details and submitted the request to Application Admin for further review. No answer on direct transfer. Task created for Application Admin to follow up. Will follow up to confirm the callback occurred.', yesBranch:'', noBranch:'applicant will wait to hear back directly. Applicant declined further contact - No further action required', dnr:'Refund Inquiry'},
  {id:42, cat:'Applicant Related', title:'Applicant - Move In Date Change', opening:'Applicant called requesting to change their move-in date. I confirmed the requested new date and checked with the Onsite team on availability for that timeline. Offered to confirm the updated move-in date once verified.', yesBranch:'new move-in date confirmed. Will follow up to confirm final scheduling', noBranch:'applicant needs to finalize their preferred date later. Asked if I can follow up to check their decision. Applicant declined further contact - No further action required', dnr:'Move In Date Change'},
  {id:43, cat:'Applicant Related', title:'Applicant - Application Withdrawal', opening:'Applicant called requesting to withdraw their application. I confirmed their request and explained any applicable next steps regarding fees already paid. Offered to process the withdrawal and confirm in writing.', yesBranch:'withdrawal confirmed and processed. Will follow up to confirm completion', noBranch:'applicant wants to reconsider before withdrawing. Asked if I can follow up to check their final decision. Applicant declined further contact - No further action required', dnr:'Application Withdrawal'},
  {id:44, cat:'Applicant Related', title:'Applicant - Cancelled', opening:'Applicant called to inform us that their application has been cancelled or that they are no longer moving forward. I confirmed the cancellation and asked if there was anything that led to this decision. Offered to keep their information on file should their plans change.', yesBranch:'applicant is open to being contacted again in the future. Will follow up if circumstances change', noBranch:'applicant has fully decided against moving forward. Applicant declined further contact - No further action required', dnr:'Application Cancelled'},
  {id:45, cat:'Applicant Related', title:'Applicant - Denied Application', opening:'Applicant called regarding a denied application and asked about next steps. I confirmed the decision was based on credit, criminal, or eviction screening results through TransUnion and explained that disputes must go directly through TransUnion using the contact details in their results email. I also confirmed that if reapplying within 30 days, the original application should be reactivated through Application Admin rather than submitting a brand new one. Offered to submit the reactivation request once the dispute is resolved.', yesBranch:'applicant will dispute with TransUnion and follow up afterward. Will follow up to check the outcome', noBranch:'applicant understood and had no further questions. Applicant declined further contact - No further action required', dnr:'Denied Application'},
  {id:46, cat:'Resident Related', title:'Resident - Maintenance Request', opening:'Resident called to submit a maintenance request for an issue in their unit. I gathered the details of the issue and confirmed whether it was an emergency or routine request. Offered to log the request and provide a reference for follow-up.', yesBranch:'request logged and resident wants updates. Will follow up to confirm the maintenance visit', noBranch:'resident will follow up on their own if needed. Resident declined further contact - No further action required', dnr:'Maintenance Request'},
  {id:47, cat:'Resident Related', title:'Resident - Work Order Follow Up', opening:'Resident called to check on the status of an existing maintenance work order. I looked up the work order and provided an update on its current status. Offered to follow up directly with the maintenance team for additional details.', yesBranch:'resident wants a follow-up once more information is available. Will follow up to confirm the work order status', noBranch:'resident will check back another time. Resident declined further contact - No further action required', dnr:'Work Order Follow Up'},
  {id:48, cat:'Resident Related', title:'Resident - Rent Payment Question (Billing/Charges - Routes to BM)', opening:'Resident called with a question about a charge on their rent payment or account. I confirmed the resident is on the lease and that the topic falls under Business Manager (BM) responsibility. I attempted a live transfer to the BM assigned to the resident\'s POD, one attempt only. BM did not answer, so a task was created for the assigned BM to follow up.', yesBranch:'resident is open to a callback within 24-48 hours. Will follow up to confirm BM completed the task on time', noBranch:'resident will wait to hear back directly. Resident declined further contact - No further action required', dnr:'Rent Payment Question'},
  {id:49, cat:'Resident Related', title:'Resident - Late Fee Question (Billing/Charges - Routes to BM)', opening:'Resident called asking about a late fee charged to their account. I confirmed the resident is on the lease and that the topic falls under BM responsibility. I attempted a live transfer to the BM assigned to the resident\'s POD, one attempt only. BM did not answer, so a task was created for the assigned BM to follow up.', yesBranch:'resident is open to a callback within 24-48 hours. Will follow up to confirm BM completed the task on time', noBranch:'resident will wait to hear back directly. Resident declined further contact - No further action required', dnr:'Late Fee Question'},
  {id:50, cat:'Resident Related', title:'Resident - Lease Clarification', opening:'Resident called asking for clarification on a lease term, policy, or clause. I reviewed the lease details with the resident and answered their questions to the extent within our scope. Offered to loop in Resident Experience if further clarification was needed.', yesBranch:'resident wants the matter escalated for further clarification. Will follow up to confirm the response from Resident Experience', noBranch:'resident\'s question was fully answered. Resident declined further contact - No further action required', dnr:'Lease Clarification'},
  {id:51, cat:'Resident Related', title:'Resident - Utility Billing (Billing/Charges - Routes to BM)', opening:'Resident called with a question about a utility charge on their account. I confirmed the resident is on the lease and that the topic falls under BM responsibility. I attempted a live transfer to the BM assigned to the resident\'s POD, one attempt only. BM did not answer, so a task was created for the assigned BM to follow up.', yesBranch:'resident is open to a callback within 24-48 hours. Will follow up to confirm BM completed the task on time', noBranch:'resident will wait to hear back directly. Resident declined further contact - No further action required', dnr:'Utility Billing'},
  {id:52, cat:'Resident Related', title:'Resident - Parking Concern', opening:'Resident called regarding a parking concern, such as assigned spots, guest parking, or an unauthorized vehicle. I gathered the details of the concern and confirmed whether it needed to be addressed by the Onsite team. Offered to submit the concern directly to Onsite.', yesBranch:'concern submitted and resident wants a follow-up. Will follow up to confirm it was addressed', noBranch:'resident will follow up with Onsite directly. Resident declined further contact - No further action required', dnr:'Parking Concern'},

function escapeHtml(text){
  return (text||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function linkify(text){
  const escaped = escapeHtml(text);
  const urlPattern = /(https?:\/\/[^\s<]+)/g;
  return escaped.replace(urlPattern, raw=>{
    let url = raw;
    let trail = '';
    const m = url.match(/[.,;:!?)\]]+$/);
    if(m){ trail = m[0]; url = url.slice(0, url.length - trail.length); }
    return `<a href="${url}" target="_blank" rel="noopener" style="color:#2563eb;text-decoration:underline">${url}</a>${trail}`;
  });
}
function toDriveEmbedUrl(url){
  if(!url)return null;
  // Matches both /file/d/FILEID/view and open?id=FILEID formats
  const m = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if(!m) return null;
  return `https://drive.google.com/file/d/${m[1]}/preview`;
}
function toSheetsEmbedUrl(url){
  if(!url)return null;
  const m = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
  if(!m) return null;
  const id = m[1];
  const gm = url.match(/[#&?]gid=(\d+)/);
  const gid = gm ? gm[1] : '0';
  // widget=true + headers=false gives a clean embedded read-only view
  return `https://docs.google.com/spreadsheets/d/${id}/preview?gid=${gid}`;
}
function badge(cat,type='cat'){
  const c=CAT_COLORS[cat]||{bg:'#f1f5f9',c:'#475569'};
  return `<span class="badge" style="background:${c.bg};color:${c.c}">${cat}</span>`;
}
function pct(a,g){if(!g)return 0;return Math.min(Math.round((a/g)*100),100);}
function onGoal(a,g){return a>0&&a>=g;}
function statusChip(a,g){
  if(!a)return`<span class="kpi-status no-data">No data</span>`;
  const og=onGoal(a,g);
  return`<span class="kpi-status ${og?'on-goal':'below'}">${og?'✓ On Goal':'✗ Below'}</span>`;
}

let scorecardAutoSyncInterval = null;
const SCORECARD_AUTO_SYNC_MS = 3 * 60 * 1000; // every 3 minutes while the tab is open

function manageScorecardAutoSync(page){
  // Always clear any existing timer first to avoid stacking multiple intervals
  if(scorecardAutoSyncInterval){
    clearInterval(scorecardAutoSyncInterval);
    scorecardAutoSyncInterval = null;
  }
  if(page === 'scorecard' && state.sheetUrl){
    // Fetch immediately on entering the tab, don't wait for the first timer tick
    syncSheet(true);
    scorecardAutoSyncInterval = setInterval(()=>{
      // Only keep syncing if we're still actually on the scorecard page
      // (guards against a stray interval surviving an unexpected navigation path)
      if(state.page === 'scorecard') syncSheet(true);
      else { clearInterval(scorecardAutoSyncInterval); scorecardAutoSyncInterval = null; }
    }, SCORECARD_AUTO_SYNC_MS);
  }
}

function flipCard(m){
  const frontFace = m.photo
    ? `<img src="${m.photo}" alt="${m.name}" style="width:110px;height:110px;border-radius:50%;object-fit:cover;object-position:center top;border:3px solid rgba(255,255,255,.6);margin-bottom:10px;box-shadow:0 2px 12px rgba(0,0,0,.25)" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="flip-avatar" style="display:none">${m.emoji}</div>`
    : `<div class="flip-avatar" style="width:90px;height:90px;font-size:40px">${m.emoji}</div>`;
  const cardId = 'fc_' + m.id;
  return`<div class="flip-card" id="${cardId}" onclick="document.getElementById('${cardId}').classList.toggle('flipped')">
    <div class="flip-inner">
      <div class="flip-front" style="background:linear-gradient(160deg,${m.color}ee,${m.color}99);border:1.5px solid rgba(255,255,255,.15)">
        ${frontFace}
        <div class="flip-name" style="font-size:13px;font-weight:800;color:#fff;text-align:center;text-shadow:0 1px 4px rgba(0,0,0,.3)">${m.name}</div>
        <div class="flip-hint" style="font-size:10px;color:rgba(255,255,255,.6);margin-top:6px">Tap to flip ↻</div>
      </div>
      <div class="flip-back" style="border:2px solid ${m.color}44">
        <div class="flip-bar" style="background:${m.color}"></div>
        <div class="flip-back-name">${m.name}</div>

function daysUntil(dateStr){
  const due = new Date(dateStr+'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.ceil((due - today) / (1000*60*60*24));
}

async function postAnnouncementComment(announcementId){
  const visitorName = getVisitorName();
  if(!visitorName){ alert('Please select your name first (refresh the page if you weren\'t asked).'); return; }
  const text = ((state.commentDrafts||{})[announcementId]||'').trim();
  if(!text) return;

  const announcement = state.announcements.find(a=>a.id===announcementId);
  if(!announcement) return;
  if(!announcement.comments) announcement.comments = [];
  const newComment = { id: Date.now(), name: visitorName, text };
  announcement.comments.push(newComment);

  state.commentDrafts[announcementId] = '';
  render();

  // Persist to Firestore — comments live as a sub-field on the announcement
  // itself inside the same announcements_list document we already use.
  const existing = await loadOneFromFirestore('announcements_list');
  const list = existing.items || [];
  const idx = list.findIndex(item=>item.id===announcementId);
  if(idx !== -1){
    if(!list[idx].comments) list[idx].comments = [];
    list[idx].comments.push(newComment);
  }
  const saved = await saveToFirestore('announcements_list', {items: list});
  if(!saved) console.warn('Comment saved locally but failed to sync to Firestore — other agents may not see it yet.');
}

async function deleteAnnouncementComment(announcementId, commentId){
  const announcement = state.announcements.find(a=>a.id===announcementId);
  if(!announcement || !announcement.comments) return;
  announcement.comments = announcement.comments.filter(c=>c.id!==commentId);
  render();

  const existing = await loadOneFromFirestore('announcements_list');
  const list = existing.items || [];
  const idx = list.findIndex(item=>item.id===announcementId);
  if(idx !== -1 && list[idx].comments){
    list[idx].comments = list[idx].comments.filter(c=>c.id!==commentId);
  }
  await saveToFirestore('announcements_list', {items: list});
}

function parseGraceHillXLS(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=new Uint8Array(ev.target.result);
      const wb=XLSX.read(data,{type:'array',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(!rows.length){alert('No data found in the file.');return;}

      // Map column names flexibly
      const first=rows[0];
      const keys=Object.keys(first);
      const empKey   =keys.find(k=>k.toLowerCase().includes('employee')&&!k.toLowerCase().includes('id')&&!k.toLowerCase().includes('position'));
      const titleKey =keys.find(k=>k.toLowerCase().includes('training')&&k.toLowerCase().includes('title'));
      const dueKey   =keys.find(k=>k.toLowerCase().includes('due')&&k.toLowerCase().includes('date'));
      const daysKey  =keys.find(k=>k.toLowerCase().includes('days'));

      if(!empKey||!titleKey||!dueKey){
        alert('Could not find required columns. Expected: Employee, Training Title, Due Date.');
        return;
      }

      // Clear existing non-completed trainings and reload from file
      state.trainings=state.trainings.filter(t=>t.completed);

      rows.forEach((row,i)=>{
        const emp=String(row[empKey]||'').trim();
        const title=String(row[titleKey]||'').trim();
        if(!emp||!title)return;

        // Parse due date
        let dueStr='';
        const rawDue=row[dueKey];
        if(rawDue instanceof Date){
          dueStr=rawDue.toISOString().split('T')[0];
        } else if(typeof rawDue==='string'&&rawDue.includes('/')){
          // MM/DD/YYYY → YYYY-MM-DD
          const parts=rawDue.split('/');
          if(parts.length===3) dueStr=`${parts[2]}-${parts[0].padStart(2,'0')}-${parts[1].padStart(2,'0')}`;
        } else if(typeof rawDue==='number'){
          // Excel serial date
          const d=new Date(Math.round((rawDue-25569)*86400*1000));
          dueStr=d.toISOString().split('T')[0];
        }

        if(!dueStr)return;

        // Check if same training+agent already exists from a previous manual entry
        const exists=state.trainings.find(t=>t.title===title&&t.agent===emp);
        if(!exists){
          state.trainings.push({id:Date.now()+i,title,agent:emp,due:dueStr,completed:false});
        }
      });

      const count=state.trainings.filter(t=>!t.completed).length;
      alert(`✓ Loaded ${count} training assignment${count!==1?'s':''} from Grace Hill report!`);
      render();
    }catch(err){
      alert('Error reading file: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
  input.value='';
}

async function addSpielRecording(spielId){
  const spiel = SPIELS.find(s=>s.id===spielId);
  if(!spiel)return;
  const url = prompt('Paste the Google Drive share link for this recording (MP3/MP4):', spiel.recordingUrl||'');
  if(url===null)return; // cancelled
  spiel.recordingUrl = url.trim();
  render();
  // Persist to Firestore so every agent sees this without needing to be logged in
  const existing = await loadOneFromFirestore('spiel_recordings');
  existing[spielId] = spiel.recordingUrl;
  const saved = await saveToFirestore('spiel_recordings', existing);
  if(!saved) console.warn('Recording saved locally but failed to sync to Firestore — other agents may not see it yet.');
}

function copyFullScript(scriptId, btn){
  const s = CALL_SCRIPTS.find(x=>x.id===scriptId);
  if(!s)return;
  let fullText = s.opening;
  if(s.yesBranch) fullText += ' Customer said Yes, ' + s.yesBranch + '.';
  if(s.noBranch) fullText += ' Customer said No, ' + s.noBranch + '.';
  fullText += ' DNR - ' + s.dnr;
  navigator.clipboard.writeText(fullText).then(()=>{
    if(btn){
      const original = btn.textContent;
      btn.textContent = '✓ Copied!';
      setTimeout(()=>{btn.textContent = original;}, 1500);
    }
  });
}

function toCsvUrl(url){
  try{
    const m=url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
    if(!m)return null;
    const id=m[1];
    const gm=url.match(/[#&?]gid=(\d+)/);
    const gid=gm?gm[1]:'0';
    return`https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}`;
  }catch(e){return null;}
}

async function syncSheet(silent){
  if(!state.sheetUrl){
    if(!silent){state.syncMsg='Paste your Google Sheet link first.';state.syncStatus='error';render();}
    return;
  }
  const csvUrl=toCsvUrl(state.sheetUrl);
  if(!csvUrl){
    if(!silent){state.syncMsg='Invalid Google Sheets URL.';state.syncStatus='error';render();}
    return;
  }
  if(!silent){state.syncStatus='loading';state.syncMsg='';render();}

  // Try a list of CORS proxies in order — fall back if one is down.
  // Note: corsproxy.io was removed after being flagged by multiple security
  // vendors for suspicious activity (as of March 2026). Using CodeTabs and
  // allorigins.win instead, both long-standing free proxy services.
  const proxies = [
    url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
    url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
  ];

  let text = null;
  let lastError = '';

  for (let i = 0; i < proxies.length; i++) {
    try {
      const proxyUrl = proxies[i](csvUrl);
      const res = await fetch(proxyUrl, { cache: 'no-store' });
      if (!res.ok) { lastError = `Proxy ${i+1} returned ${res.status}`; continue; }
      const raw = await res.text();
      // allorigins /get wraps response in JSON {contents: "..."}; /raw and codetabs return plain text
      if (raw.trim().startsWith('{') && raw.includes('"contents"')) {
        try {
          const json = JSON.parse(raw);
          text = json.contents || '';
        } catch(e) { text = raw; }
      } else {
        text = raw;
      }
      // Validate this actually looks like real CSV data, not an HTML error page,
      // a JS redirect snippet, a literal "null", or an empty/whitespace-only response.
      const t = (text || '').trim();
      const looksLikeRealCsv = t.length > 10
        && !t.startsWith('<')
        && t.toLowerCase() !== 'null'
        && !t.toLowerCase().startsWith('window.location')
        && !t.toLowerCase().includes('accounts.google.com')
        && t.includes(',');  // a CSV with at least one comma-separated row
      if (looksLikeRealCsv) break; // genuinely usable, stop trying more proxies
      lastError = `Proxy ${i+1} returned invalid content (not real CSV data)`;
      text = null;
    } catch(err) {
      lastError = `Proxy ${i+1} failed: ${err.message}`;
    }
  }

  if (!text) {
    if(!silent){
      state.syncStatus='error';
      state.syncMsg=`Could not reach the sheet right now (${lastError||'all proxy services failed'}). This is usually a temporary outage with the free proxy service, not a problem with your sheet. Try again in a minute, or use the manual entry tabs in the meantime.`;
      render();
    } else {
      // Auto-sync failures stay quiet in the UI but we still record the attempt
      state.lastAutoSyncError = lastError || 'All proxies failed';
    }
    return;
  }

  try{
    const lines=text.split('\n').filter(l=>l.trim());
    if(lines.length<1)throw new Error('Sheet appears empty.');

    // Detect whether row 0 is a header row (contains "KPI" or "Score" as literal labels)
    // or whether data starts immediately (your actual sheet format: KPI name in col A, score in col B, no header)
    const firstRowCols = lines[0].split(',').map(c=>c.trim().toLowerCase().replace(/"/g,''));
    const looksLikeHeader = firstRowCols.some(c=>c==='kpi'||c==='metric') && firstRowCols.some(c=>c==='score'||c==='actual'||c==='value');

    let ki, si, dataLines;
    if (looksLikeHeader) {
      ki = firstRowCols.findIndex(h=>h.includes('kpi')||h.includes('metric')||h.includes('name'));
      si = firstRowCols.findIndex(h=>h.includes('score')||h.includes('actual')||h.includes('value'));
      dataLines = lines.slice(1);
    } else {
      // No header — assume column A = KPI name, column B = Score (your sheet's actual format)
      ki = 0;
      si = 1;
      dataLines = lines;
    }

    const u={...state.teamScores};
    let matchedAny=false;
    dataLines.forEach(line=>{
      const cols=line.split(',').map(c=>c.trim().replace(/"/g,''));
      const n=(cols[ki]||'').toLowerCase();
      if(!n)return; // skip blank rows
      const v=parseFloat((cols[si]||'').replace('%',''))||0;
      if(n.includes('call')&&n.includes('completion')){u.call_completion=v;matchedAny=true;}
      else if(n.includes('lead engagement')||n.includes('lead eng')){u.lead_engagement=v;matchedAny=true;}
      else if(n.includes('task management')||n.includes('task')){u.task_management=v;matchedAny=true;}
      else if(n.includes('lead to scheduled')||n.includes('scheduled tour')){u.lead_to_scheduled=v;matchedAny=true;}
      else if(n.includes('lead to tour')&&!n.includes('scheduled')){u.lead_to_tour=v;matchedAny=true;}
    });

    if(!matchedAny)throw new Error('Could not find any matching KPI rows. Check that column A has KPI names like "Call Completion Rate" and column B has the scores.');

    state.teamScores=u;
    state.lastAutoSyncError = null;
    state.lastSynced=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    if(!silent){
      state.syncStatus='success';state.syncMsg='Scores synced!';
      setTimeout(()=>{state.syncStatus='idle';state.syncMsg='';render();},5000);
    }
  }catch(err){
    if(!silent){
      state.syncStatus='error';
      state.syncMsg=err.message||'Could not parse sheet data.';
    } else {
      state.lastAutoSyncError = err.message||'Could not parse sheet data.';
    }
  }
  render();
}
function handleFenixUpload(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const lines=ev.target.result.split('\n').filter(l=>l.trim());
      if(lines.length<2){state.fenixMsg='File appears empty.';render();return;}
      const h=lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/"/g,''));
      const ni=h.findIndex(x=>x.includes('agent')||x.includes('name'));
      const si=h.findIndex(x=>x.includes('score')||x.includes('percent')||x.includes('%'));
      if(ni===-1||si===-1){state.fenixMsg='CSV needs: Agent Name, Score.';render();return;}
      const parsed=lines.slice(1).map(l=>{
        const c=l.split(',').map(x=>x.trim().replace(/"/g,''));
        const scoreRaw = c[si]||'';
        // Handle percentage formats like "94.62%" or "0.9462"
        let score = parseFloat(scoreRaw.replace('%',''))||0;
        // If score is between 0 and 1, it's a decimal percentage — convert to %
        if(score > 0 && score <= 1) score = Math.round(score * 1000) / 10;
        return{name:c[ni]||'',fenix:score};
      }).filter(a=>a.name && a.fenix > 0);
      state.agents=state.agents.map(a=>{const m=parsed.find(p=>p.name.toLowerCase()===a.name.toLowerCase());return m?{...a,fenix_scored_calls:m.fenix}:a;});
      // Use the max value as the team average (catches summary/total rows from Fenix)
      const teamAvg = parsed.length > 0 ? Math.round(Math.max(...parsed.map(a=>a.fenix))*10)/10 : 0;
      state.teamScores.fenix_scored_calls = teamAvg;
      state.fenixMsg=`✓ ${parsed.length} agents loaded`;
      setTimeout(()=>{state.fenixMsg='';render();},5000);
    }catch(e){state.fenixMsg='Could not read file.';}
    render();
  };
  reader.readAsText(file);
}

function finalizeChecklist(){
  const lines=[];
  CHECKLIST_SECTIONS.forEach(sec=>{
    const checkedItems = sec.items.filter((_,i)=>state.checklistChecked[sec.key+i]);
    const revisionLine = (sec.hasRevisionToggle && state.checklistRevision)
      ? [state.checklistRevision==='with' ? 'With Revision' : 'Without Revision']
      : [];
    const allLines = [...revisionLine, ...checkedItems];
    if(allLines.length){
      lines.push(sec.title+':');
      allLines.forEach(item=>lines.push('- '+item));
      lines.push('');
    }
  });
  if(!lines.length){
    state.checklistCopyMsg='Nothing checked yet — check off the items you completed first.';
    render();
    return;
  }
  const text = lines.join('\n').trim();
  const done = ()=>{
    state.checklistCopyMsg='✓ Copied to clipboard. Checklist cleared for the next file.';
    state.checklistChecked={};
    state.checklistRevision='';
    render();
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>{
      state.checklistCopyMsg='Could not copy automatically — please copy manually.';
      render();
    });
  }else{
    // Fallback for older browsers without the async Clipboard API
    const ta=document.createElement('textarea');
    ta.value=text; document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); done(); }
    catch(e){ state.checklistCopyMsg='Could not copy automatically — please copy manually.'; render(); }
    document.body.removeChild(ta);
  }
}

async function addNewPeriod(tab){
  if(!state.newPeriodLabel||!state.newPeriodLabel.trim()){alert('Please enter a label.');return;}
  const history = tab==='monthend' ? state.monthendHistory : state.quarterlyHistory;
  const newId = history.length ? Math.max(...history.map(p=>p.id))+1 : 1;
  history.push({
    id:newId,
    label:state.newPeriodLabel.trim(),
    kpis:KPI_CONFIG.map(k=>({label:k.label,actual:0,goal:k.goal,unit:k.unit})),
  });
  state.newPeriodLabel='';
  state.showAddPeriodForm=false;
  state.expandedPeriod=newId; // auto-expand the new one so they can fill it in right away
  render();
  await savePeriodHistory();
}

async function deletePeriod(tab,periodId){
  if(!confirm('Delete this period entirely? This cannot be undone.'))return;
  if(tab==='monthend'){
    state.monthendHistory = state.monthendHistory.filter(p=>p.id!==periodId);
  } else {
    state.quarterlyHistory = state.quarterlyHistory.filter(p=>p.id!==periodId);
  }
  if(state.expandedPeriod===periodId) state.expandedPeriod=null;
  render();
  await savePeriodHistory();
}

async function savePeriodMetric(tab,periodId,kpiIdx){
  const history = tab==='monthend' ? state.monthendHistory : state.quarterlyHistory;
  const period = history.find(p=>p.id===periodId);
  if(!period)return;
  const editKey = `${periodId}_${kpiIdx}`;
  const actual = parseFloat(document.getElementById('pa_'+editKey).value)||0;
  const goal   = parseFloat(document.getElementById('pg_'+editKey).value)||0;
  period.kpis[kpiIdx] = {...period.kpis[kpiIdx], actual, goal};
  state.editingPeriodMetric=null;
  render();
  await savePeriodHistory();
}

async function changeManagerPassword(){
  const newPassword = prompt('Enter the new manager password:');
  if(!newPassword || !newPassword.trim()){return;}
  const confirmPassword = prompt('Confirm the new password:');
  if(newPassword.trim() !== confirmPassword){alert('Passwords did not match. Password was not changed.');return;}
  MANAGER_PASSWORD = newPassword.trim();
  const saved = await saveToFirestore('manager_auth', {password: MANAGER_PASSWORD});
  if(saved){
    alert('Password updated! This applies to all future logins for everyone with manager access.');
  } else {
    alert('Password changed for this session, but failed to save permanently. Try again or check your connection.');
  }
}
function doLoginPage(){
  const email=state.loginEmail.trim().toLowerCase();

  state.loginError='';state.loginLoading=true;render();

    if(email==='rdltrinidad@avantiresidential.com' && password===MANAGER_PASSWORD){
      state.manager={name:'Rowel De La Trinidad',email,role:'Lead Management Manager'};
      persistManagerSession(state.manager);
      state.loginLoading=false;
      state.loginPassword='';
    }else{state.loginError='Incorrect email or password.';state.loginLoading=false;}
    render();
  },1200);
}

function saveCoachingLog(){
  if(!state.clCoachee){alert('Please select a coachee.');return;}
  if(!state.clDate){alert('Please select a date.');return;}
  if(!state.clCategory){alert('Please select a category.');return;}
  if(!state.clNotes||!state.clNotes.trim()){alert('Please add coaching notes.');return;}
  const newLog={
    id:Date.now(),
    coachee:state.clCoachee,
    date:state.clDate,
    category:state.clCategory,
    notes:state.clNotes.trim(),
    fileName:state.clFileName||'',
    driveUrl:state.clDriveUrl||'',
  };
  coachingLogs.push(newLog);
  state.showCoachingForm=false;
  state.clCoachee='';state.clDate='';state.clCategory='';state.clNotes='';state.clFileName='';state.clDriveUrl='';
  render();
}

function deleteCoachingLog(id){
  if(!confirm('Delete this coaching log?'))return;
  coachingLogs=coachingLogs.filter(l=>l.id!==id);
  state.expandedCoaching=null;
  render();
}

// then quietly hydrate from Firestore and re-render once real data arrives.
// Restore a previously persisted manager login, if any, before the first render
const restoredManager = loadPersistedManagerSession();
if(restoredManager) state.manager = restoredManager;

render();
hydrateFromFirestore().then(()=>render()).catch(err=>console.error('Hydrate failed:', err));

// Start the online-presence system once Firestore (db) is ready.
// If this is the visitor's first time, this will show the name picker.
startPresenceSystem();
</script>
</body>
</html>
